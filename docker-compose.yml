version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: agriverse-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://adphim:D23EbDE205Ac719E@42.118.102.108:20830/pgphim
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:3001,http://localhost:3002,http://localhost:5173
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - agriverse-network

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: agriverse-cms
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://agriverse-api:3000
      DOCKER_ENV: 'true'
    depends_on:
      - api
    volumes:
      - ./cms:/app
      - /app/node_modules
    networks:
      - agriverse-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agriverse-web
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - api
    networks:
      - agriverse-network

networks:
  agriverse-network:
    driver: bridge
